<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>irem 💜</title>

<style>
body{
  margin:0;
  background:#0d001a;
  color:white;
  font-family:Arial;
  overflow-x:hidden;
}

/* 🌌 GALAXY BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* HERO */
.hero{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.hero h1{
  font-size:5rem;
  color:#f0abfc;
}

/* 💜 HEART ANIMATION */
.heart{
  position:fixed;
  font-size:20px;
  pointer-events:none;
  animation:pop 1s ease-out forwards;
  z-index:999;
}

@keyframes pop{
  0%{transform:scale(1);opacity:1;}
  100%{transform:translate(var(--x),var(--y)) scale(2);opacity:0;}
}

/* 🐱 CATS */
.cats{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  padding:30px;
}

.cats img,
.cats video{
  width:250px;
  border-radius:18px;
}

/* 🎧 SPOTIFY */
.spotify{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  margin:40px 0;
}

iframe{
  width:90%;
  max-width:600px;
  height:152px;
  border-radius:16px;
  border:none;
}

/* 💎 DISCORD */
.discord{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  padding:40px;
}

.box{
  width:260px;
  background:#1a0030;
  padding:20px;
  border-radius:18px;
  text-align:center;
}

.box img{
  width:100px;
  height:100px;
  border-radius:50%;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="hero">
  <h1>irem 💜</h1>
</div>

<!-- 🎧 SPOTIFY -->
<div class="spotify">
<iframe
src="https://open.spotify.com/embed/playlist/1EkbiC9gHVqL9lwvHs1z2K?utm_source=generator&theme=0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<!-- 🐱 GIF / MP4 -->
<div class="cats">

<img src="https://media.tenor.com/Iy_oqBMrFGEAAAAC/cat-kitten.gif">

<img src="https://media.tenor.com/2Gg_JCNqFvAAAAAC/cute-cat-cat.gif">

<video autoplay loop muted playsinline>
  <source src="https://media.tenor.com/RN2uP2yDwd0AAAPo/kedi-kitty.mp4">
</video>

</div>

<!-- 📸 PHOTOS -->
<div class="cats">
<img src="https://media.discordapp.net/attachments/1495833415201722392/1498372094012952738/manita1.png">
<img src="https://media.discordapp.net/attachments/1495833415201722392/1498372095032430745/manita2.png">
</div>

<!-- 💎 DISCORD -->
<div class="discord">

<div class="box">
<img id="a1">
<div id="n1">loading...</div>
<div>969230413593714718</div>
</div>

<div class="box">
<img id="a2">
<div id="n2">loading...</div>
<div>959756088859828235</div>
</div>

</div>

<script>

/* 🌌 STAR GALAXY */
const c=document.getElementById("bg");
const x=c.getContext("2d");

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let stars=[];
for(let i=0;i<250;i++){
  stars.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*1.5
  });
}

function draw(){
  x.fillStyle="#0d001a";
  x.fillRect(0,0,c.width,c.height);

  x.fillStyle="white";

  stars.forEach(s=>{
    x.beginPath();
    x.arc(s.x,s.y,s.r,0,Math.PI*2);
    x.fill();

    s.y+=0.3;
    if(s.y>c.height){
      s.y=0;
      s.x=Math.random()*c.width;
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* 💜 CLICK HEARTS */
document.addEventListener("click",(e)=>{
  for(let i=0;i<8;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💜";
    h.style.left=e.clientX+"px";
    h.style.top=e.clientY+"px";
    h.style.setProperty("--x",(Math.random()*200-100)+"px");
    h.style.setProperty("--y",(Math.random()*200-100)+"px");
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
});

/* 💎 DISCORD FIX */
async function load(id,img,name){
  try{
    const r=await fetch("https://api.lanyard.rest/v1/users/"+id);
    const d=await r.json();
    const u=d.data.discord_user;

    img.src = u.avatar
      ? `https://cdn.discordapp.com/avatars/${id}/${u.avatar}.png`
      : "https://cdn.discordapp.com/embed/avatars/0.png";

    name.textContent=u.global_name||u.username;

  }catch{
    img.src="https://cdn.discordapp.com/embed/avatars/0.png";
    name.textContent="offline";
  }
}

load("969230413593714718",
document.getElementById("a1"),
document.getElementById("n1"));

load("959756088859828235",
document.getElementById("a2"),
document.getElementById("n2"));

</script>

</body>
</html>
